name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  worker:
    name: Worker (test + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm run test
      - name: Mutation testing (Stryker)
        run: npm run test:mutate
        continue-on-error: true

  sdk:
    name: SDK (test + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://status.bundlenudge.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build

name = "bundlenudge-status"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *"]

[[kv_namespaces]]
binding = "STATUS_KV"
id = "TO_BE_CREATED"

[[d1_databases]]
binding = "STATUS_DB"
database_name = "bundlenudge-status-db"
database_id = "TO_BE_CREATED"

[vars]
ENVIRONMENT = "production"
STATUS_PAGE_URL = "https://status.bundlenudge.com"

[observability]
enabled = true
head_sampling_rate = 1
